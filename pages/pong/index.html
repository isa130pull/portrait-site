  <style>
    :root{
      --bg: #0b0c0f;
      --fg: #e8eaed;
      --muted: #a1a7b3;
      --accent: #60d5ff;
      --card: #14161a;
      --border: #1f2329;
    }
    @media (prefers-color-scheme: light){
      :root{ --bg:#ffffff; --fg:#111318; --muted:#5a6472; --card:#f7f8fa; --border:#e5e7eb; --accent:#0ea5e9; }
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--fg);
      font:16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      touch-action:none;
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:16px 24px;
      width:100%;
    }
    header{
      padding:8px 0;
      border-bottom:1px solid var(--border);
    }
    header .wrap{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .back-link{
      display:inline-block;
      margin-bottom:0;
      padding:8px 16px;
      border:1px solid var(--border);
      border-radius:8px;
      color:var(--fg);
      text-decoration:none;
      transition:border-color 0.2s;
    }
    .back-link:hover{
      border-color:var(--accent);
    }
    .game-container{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      position:relative;
    }
    .mute-btn,
    .ranking-btn{
      width:48px;
      height:48px;
      border:2px solid var(--border);
      border-radius:8px;
      background:var(--card);
      color:var(--fg);
      font-size:24px;
      cursor:pointer;
      transition:all 0.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      flex-shrink:0;
    }
    .mute-btn:hover,
    .ranking-btn:hover{
      border-color:var(--accent);
    }
    .mute-btn.muted{
      opacity:0.5;
    }
    .header-buttons{
      display:flex;
      gap:12px;
      align-items:center;
    }
    #canvas{
      display:block;
      max-width:100%;
      max-height:100%;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }
    @media (max-width: 767px){
      .wrap{padding:8px 12px}
      header{padding:6px 0}
    }

    /* 名前入力UI */
    #nameInputContainer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 32px 24px;
      z-index: 1000;
      display: none;
      min-width: 320px;
      max-width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #nameInputContainer.show {
      display: block;
    }
    #nameInputContainer h2 {
      margin: 0 0 16px 0;
      font-family: 'Orbitron', monospace;
      font-size: 24px;
      color: var(--accent);
      text-align: center;
    }
    #nameInputContainer p {
      margin: 0 0 16px 0;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }
    #playerNameInput {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-family: 'Orbitron', monospace;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    #playerNameInput:focus {
      outline: none;
      border-color: var(--accent);
    }
    .name-input-buttons {
      display: flex;
      gap: 12px;
    }
    .name-input-buttons button {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      font-family: 'Orbitron', monospace;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--card);
      color: var(--fg);
    }
    #submitScoreBtn {
      border-color: var(--accent) !important;
      color: var(--accent) !important;
    }
    #submitScoreBtn:hover {
      background: var(--accent);
      color: var(--bg) !important;
    }
    #skipScoreBtn:hover {
      border-color: var(--accent);
    }
    #nameInputContainer .error-message {
      color: #ff5555;
      font-size: 14px;
      margin-top: -8px;
      margin-bottom: 8px;
      display: none;
    }
    #nameInputContainer .error-message.show {
      display: block;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 999;
      display: none;
    }
    .overlay.show {
      display: block;
    }
    @media (max-width: 767px){
      #nameInputContainer {
        padding: 24px 16px;
        min-width: 280px;
      }
      #nameInputContainer h2 {
        font-size: 20px;
      }
    }
  </style>

  <!-- 名前入力UI -->
  <div id="nameInputContainer">
    <h2>RANKING</h2>
    <p>ランキングに登録しますか？</p>
    <input type="text" id="playerNameInput" placeholder="名前を入力（3-12文字）" maxlength="12" autocomplete="off">
    <div class="error-message" id="nameErrorMessage"></div>
    <div class="name-input-buttons">
      <button id="skipScoreBtn">スキップ</button>
      <button id="submitScoreBtn">登録する</button>
    </div>
  </div>
